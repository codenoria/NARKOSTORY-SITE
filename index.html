<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>фишеркинг</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background-color: #fff;
            border-bottom: 1px solid #ddd;
            margin-bottom: 20px;
        }

        header h1 {
            font-size: 2em;
        }

        header div {
            font-size: 1em;
            color: #666;
        }

        .container {
            display: flex;
            gap: 20px;
            padding: 0 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .left-column {
            flex: 0 0 200px;
            background-color: #fff;
            padding: 15px;
            border: 1px solid #ddd;
            height: fit-content;
        }

        .left-column nav ul {
            list-style: none;
        }

        .left-column nav ul li {
            margin-bottom: 10px;
        }

        .left-column nav ul li a {
            text-decoration: none;
            color: #0066cc;
            display: block;
            padding: 8px;
            border-radius: 4px;
            transition: background-color 0.3s;
        }

        .left-column nav ul li a:hover {
            background-color: #f0f0f0;
        }

        .center-column {
            flex: 1;
            background-color: #fff;
            padding: 15px;
            border: 1px solid #ddd;
            min-height: 500px;
        }

        .center-column article {
            margin-bottom: 30px;
        }

        .center-column article h2 {
            margin-bottom: 10px;
            color: #333;
        }

        .center-column article p {
            line-height: 1.6;
            color: #555;
        }

        .right-column {
            flex: 0 0 250px;
            background-color: #fff;
            padding: 15px;
            border: 1px solid #ddd;
            height: fit-content;
        }

        .right-column .ad {
            background-color: #f9f9f9;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            text-align: center;
            color: #999;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: #fff;
            border-top: 1px solid #ddd;
            margin-top: 40px;
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <header>
        <h1>фишеркинг</h1>
        <div>2026-05-03</div>
    </header>

    <div class="container">
        <!-- Left Sidebar - Menu -->
        <aside class="left-column">
            <nav>
                <ul>
                    <li><a href="#about">about</a></li>
                    <li><a href="#contact">contact</a></li>
                    <li><a href="#hostbook">hostbook</a></li>
                    <li><a href="#archive">archive</a></li>
                </ul>
            </nav>
        </aside>

        <!-- Center - Posts -->
        <main class="center-column">
            <section class="posts">
                <article>
                    <h2>Post Title</h2>
                    <p>Post content goes here</p>
                </article>
            </section>
        </main>

        <!-- Right Sidebar - Ads -->
        <aside class="right-column">
            <section class="ads">
                <div class="ad">Advertisement</div>
            </section>
        </aside>
    </div>

    <footer>
        <p>&copy; 2026 фишеркинг. All rights reserved.</p>
    </footer>
</body>
</html>
